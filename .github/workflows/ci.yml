name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Python Agent — Lint, Type-Check, Test
  # ─────────────────────────────────────────────────────────────────
  agent:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./agent

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -r requirements.txt
          uv pip install ruff pyright pytest pytest-asyncio

      - name: Lint with ruff
        run: uv run ruff check .

      - name: Check formatting with ruff
        run: uv run ruff format --check .

      - name: Type-check with pyright
        run: uv run pyright .

      - name: Test with pytest
        run: uv run pytest tests/ -v --timeout=30
        continue-on-error: true  # tests may fail without secrets

  # ─────────────────────────────────────────────────────────────────
  # Frontend — TypeScript, Lint, Test
  # ─────────────────────────────────────────────────────────────────
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Lint with ESLint
        run: npx eslint src/
        continue-on-error: true  # transitioning to ESLint — allow warnings

      - name: Test with vitest
        run: npm test
        continue-on-error: true

      - name: Build
        run: npm run build

  # ─────────────────────────────────────────────────────────────────
  # Docker Build Verification
  # ─────────────────────────────────────────────────────────────────
  docker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build agent image
        uses: docker/build-push-action@v6
        with:
          context: ./agent
          push: false
          tags: acp-agent:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build token-server image
        uses: docker/build-push-action@v6
        with:
          context: ./token-server
          push: false
          tags: acp-token-server:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: acp-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────
  # Helm Chart Lint
  # ─────────────────────────────────────────────────────────────────
  helm:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: "latest"

      - name: Lint Helm chart
        run: helm lint ./helm