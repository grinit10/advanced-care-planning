apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "acp.fullname" . }}-livekit
  labels: {{ include "acp.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "acp.fullname" . }}-livekit
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: livekit
  template:
    metadata:
      labels:
        app.kubernetes.io/component: livekit
        {{ include "acp.labels" . | nindent 8 }}
    spec:
      containers:
        - name: livekit
          image: {{ .Values.livekit.image.repository }}:{{ .Values.livekit.image.tag }}
          imagePullPolicy: {{ .Values.livekit.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.livekit.port }}
              protocol: TCP
            - containerPort: {{ .Values.livekit.udpPort }}
              protocol: UDP
            - containerPort: {{ .Values.livekit.turnPort }}
              protocol: UDP
          volumeMounts:
            - name: config
              mountPath: /livekit.yaml
              subPath: livekit.yaml
          command: ["livekit-server", "--config", "/livekit.yaml", "--node-ip", "$(POD_IP)", "--rtc.udp_port.start", "{{ .Values.livekit.udpPort }}", "--rtc.udp_port.end", "{{ .Values.livekit.turnPort }}"]
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          resources: {{ toYaml .Values.livekit.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "acp.fullname" . }}-livekit