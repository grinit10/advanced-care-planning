apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "acp.fullname" . }}-agent
  labels: {{ include "acp.labels" . | nindent 4 }}
data:
  LIVEKIT_URL: "ws://{{ include "acp.fullname" . }}-livekit:7880"
  AZURE_OPENAI_ENDPOINT: "{{ .Values.azure.openai.endpoint }}"
  AZURE_OPENAI_API_VERSION: "{{ .Values.azure.openai.apiVersion }}"
  AZURE_OPENAI_LLM_DEPLOYMENT: "{{ .Values.azure.openai.deployments.llm }}"
  DEEPGRAM_BASE_URL: "https://api.au.deepgram.com"
  GROQ_VOICE_MODEL: "{{ .Values.groq.voiceModel }}"