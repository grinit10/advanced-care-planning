apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "acp.fullname" . }}-token-server
  labels: {{ include "acp.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.tokenServer.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: token-server
  template:
    metadata:
      labels:
        app.kubernetes.io/component: token-server
        {{ include "acp.labels" . | nindent 8 }}
    spec:
      containers:
        - name: token-server
          image: {{ .Values.tokenServer.image.repository }}:{{ .Values.tokenServer.image.tag }}
          imagePullPolicy: {{ .Values.tokenServer.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.tokenServer.port }}
          env:
            - name: LIVEKIT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "acp.fullname" . }}-livekit-key
                  key: apiKey
            - name: LIVEKIT_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "acp.fullname" . }}-livekit-key
                  key: apiSecret
            - name: PORT
              value: "{{ .Values.tokenServer.port }}"
          resources: {{ toYaml .Values.tokenServer.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "acp.fullname" . }}-token-server
  labels: {{ include "acp.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/component: token-server
  ports:
    - port: {{ .Values.tokenServer.port }}
      targetPort: {{ .Values.tokenServer.port }}